<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 정통 사주풀이 - 명리연구소</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lunar JavaScript Library for Saju Calculation -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <div class="site-nav">
                <a href="index.html" class="nav-btn">홈</a>
            </div>
            <div class="theme-toggle">
                <button id="theme-btn">다크 모드</button>
            </div>
        </div>
        
        <h1>2026년 정통 사주풀이</h1>
        <p class="subtitle">명리학을 기반으로 당신의 타고난 운명과 2026년 병오년(丙午年)의 흐름을 분석해 드립니다.</p>

        <!-- 사주 입력 섹션 -->
        <div class="analysis-section">
            <div class="analysis-card">
                <h2>사주 정보 입력</h2>
                <div class="saju-inputs">
                    <div class="input-row">
                        <input type="text" id="saju-name" placeholder="이름 (예: 홍길동)" required>
                        <select id="saju-gender">
                            <option value="male">남성</option>
                            <option value="female">여성</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <input type="date" id="saju-birth-date" required>
                        <input type="time" id="saju-birth-time" required>
                    </div>
                    <button id="analyze-btn" class="analyze-btn">운세 분석하기</button>
                </div>
            </div>

            <!-- 결과 출력 섹션 (기본적으로 숨김) -->
            <div id="analysis-result" class="analysis-result hidden">
                <h3><span id="res-name"></span>님의 사주 분석 결과</h3>
                
                <div class="saju-table">
                    <div class="saju-column">
                        <div class="saju-label">시주(時柱)</div>
                        <div id="saju-hour" class="saju-kanji"></div>
                    </div>
                    <div class="saju-column">
                        <div class="saju-label">일주(日柱)</div>
                        <div id="saju-day" class="saju-kanji"></div>
                    </div>
                    <div class="saju-column">
                        <div class="saju-label">월주(月柱)</div>
                        <div id="saju-month" class="saju-kanji"></div>
                    </div>
                    <div class="saju-column">
                        <div class="saju-label">연주(年柱)</div>
                        <div id="saju-year" class="saju-kanji"></div>
                    </div>
                </div>

                <div class="result-text">
                    <h4>타고난 성품과 기운</h4>
                    <p id="res-general"></p>
                    
                    <h4>2026년 병오년(丙午年) 총평</h4>
                    <p id="res-2026"></p>

                    <h4>건강 및 재물운</h4>
                    <p id="res-wealth"></p>
                </div>
            </div>
        </div>

        <div id="disqus_thread" style="margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--secondary-text);"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-5ea7zarf6b.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
    </div>
    <script src="main.js"></script>
</body>
</html>
